name: NotifyHub
options:
  bundleIdPrefix: com.notifyhub
  deploymentTarget:
    iOS: "17.0"
    macOS: "26.0"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

targets:
  NotifyHub:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Shared
      - path: iOS
      - path: macOS
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notifyhub.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    entitlements:
      path: Resources/NotifyHub.entitlements
    postBuildScripts:
      - name: Copy macOS build to iCloud
        script: |
          if [ "$PLATFORM_NAME" = "macosx" ]; then
            DEST="$HOME/Library/Mobile Documents/com~apple~CloudDocs/Applications"
            if [ -d "$DEST" ]; then
              rm -rf "$DEST/NotifyHub.app"
              cp -R "$BUILT_PRODUCTS_DIR/$WRAPPER_NAME" "$DEST/NotifyHub.app"
              echo "Copied $WRAPPER_NAME to $DEST"
            fi
          fi
        basedOnDependencyAnalysis: false
