name: NotifyHub
options:
  bundleIdPrefix: com.notifyhub
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

targets:
  NotifyHub:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Shared
      - path: iOS
        platform: [iOS]
      - path: macOS
        platform: [macOS]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notifyhub.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    entitlements:
      path: Resources/NotifyHub.entitlements
